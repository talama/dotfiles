; MODULES

; -----------------------------
; GLOBAL SEPARATOR MODULE
; -----------------------------
[module/sep]
type = custom/text
content = " "
content-foreground = ${colors.surface1}
content-padding = 0

; -----------------------------
; MENU
; -----------------------------
[module/menu]
type = custom/text
content = "  "

content-background = ${colors.peach}
content-foreground = ${colors.base}
content-padding = 2

click-left = rofi -show drun -config ~/.config/rofi/rofidmenu.rasi
click-right = rofi -show window -config ~/.config/rofi/rofidmenu.rasi

; -----------------------------
; TIME
; -----------------------------
[module/time]
type = internal/date
interval = 5

format =  %{A3:zenity --calendar --title="Calendar":}<label>%{A}
format-background = ${colors.lavender}
format-foreground = ${colors.base}
format-padding = 2

time = %I:%M %p
time-alt = " %A, %d %B %Y "
label =  %time%
click-right = zenity --calendar --title="Calendar"

; -----------------------------
; I3 WORKSPACES
; -----------------------------
[module/i3]
type = internal/i3

pin-workspaces = false
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = false
fuzzy-match = true

ws-icon-0 = "0; "
ws-icon-1 = "1; "
ws-icon-2 = "2; "
ws-icon-3 = "3; "
ws-icon-4 = "4; "
ws-icon-5 = "5; "
ws-icon-6 = "6; "
ws-icon-default = " "

format = <label-state>

label-focused = %icon%
label-focused-background = ${colors.blue}
label-focused-foreground = ${colors.base}
label-focused-padding = 2

label-unfocused = %icon%
label-unfocused-foreground = ${colors.text}
label-unfocused-padding = 2

label-visible = %icon%
label-visible-foreground = ${colors.text}
label-visible-padding = 2

label-urgent = %icon%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.base}
label-urgent-padding = 2



; -----------------------------
; DISK
; -----------------------------
[module/disk]
type = custom/script
exec = ~/.config/polybar/scripts/diskusage
interval = 5

format = <label>
format-background = ${colors.blue}
format-foreground = ${colors.base}
format-padding = 1

click-right = kitty -e gdu

; -----------------------------
; CPU
; -----------------------------
[module/cpu]
type = internal/cpu
interval = 2

format = <label>
format-background = ${colors.teal}
format-foreground = ${colors.base}
format-padding = 1

label = %percentage:2%%

; -----------------------------
; MEMORY
; -----------------------------
[module/memory]
type = custom/script
exec = ~/.config/polybar/scripts/memory
interval = 2

format = <label>
format-prefix = " "
format-background = ${colors.mauve}
format-foreground = ${colors.base}
format-padding = 1

click-right = kitty -e btop

; -----------------------------
; PULSEAUDIO
; -----------------------------
[module/pulseaudio]
type = internal/pulseaudio
interval = 5

format-volume = <ramp-volume> <label-volume>
format-volume-background = ${colors.green}
format-volume-foreground = ${colors.base}
format-volume-padding = 1

format-muted = <label-muted>
format-muted-background = ${colors.red}
format-muted-foreground = ${colors.base}
format-muted-padding = 1

label-volume = %percentage%%
label-muted = 🔇 muted

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 

click-right = pgrep pavucontrol && killall pavucontrol || pavucontrol

; -----------------------------
; TRAY
; -----------------------------
[module/tray]
type = internal/tray
tray-background = ${colors.base}
tray-padding = 1

; -----------------------------
; POWER MENU
; -----------------------------
[module/powermenu]
type = custom/text
content = "  "

content-background = ${colors.red}
content-foreground = ${colors.base}
content-padding = 1

click-left = bash ~/.config/rofi/scripts/launcher.sh powermenu
