[global/wm]
margin-top = 0
margin-bottom = 0
include-file = $HOME/.config/polybar/mocha.ini
include-file = $HOME/.config/polybar/modules.ini

[bar/main]
enable-ipc = true

width = 100%
height = 30
radius = 10
fixed-center = true

monitor = HDMI-0
background = ${colors.base}
foreground = ${colors.text}

border-size  = 2
border-color = ${colors.subtext0}

padding       = 1
module-margin-right = 0

font-0 = JetbrainsMono Nerd Font:style=Medium:size=10;2

modules-left    = menu sep i3
modules-center  = time sep popup-calendar
modules-right   = disk sep cpu sep memory sep battery pulseaudio sep tray sep powermenu

cursor-click  = pointer

[settings]
screenchange-reload = true
